name: Kindle K3G Lynx (ARMv6 Soft-Float - WORKING)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots

      - name: Install ARMv6 Soft-Float Toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabi g++-arm-linux-gnueabi
          sudo apt install -y libc6-dev-armel-cross binutils-arm-linux-gnueabi

      - name: Test K3G Compiler (ARMv6 Soft-Float)
        run: |
          arm-linux-gnueabi-gcc -static -march=armv6 -msoft-float test.c -o test
          file test  # ARMv6 soft-float ELF

      - name: Fix Lynx
        run: autoreconf -fiv

      - name: Configure for i.MX353 ARM1136 (Soft-Float)
        run: |
          export CC=arm-linux-gnueabi-gcc
          export CFLAGS="-O2 -static -march=armv6 -mtune=arm1136jf-s -msoft-float"
          
          ./configure \
            --host=arm-linux-gnueabi \
            --prefix=/opt \
            --disable-ssl \
            --disable-gopher \
            CC="$CC" CFLAGS="$CFLAGS"

      - name: Build
        run: make -j$(nproc)

      - name: Package IPKG
        run: |
          mkdir -p lynx-k3g/usr/bin
          cp lynx lynx-k3g/usr/bin/
          tar czf lynx_k3g.ipk -C lynx-k3g .

      - uses: actions/upload-artifact@v4
        with:
          name: lynx-k3g-armv6
          path: lynx_k3g.ipk
