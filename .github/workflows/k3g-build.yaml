name: K3G Lynx (NiLuJe Toolchain)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots
          ref: master

      - name: Download NiLuJe's K3G Toolchain
        run: |
          wget https://storage.gra.cloud.ovh.net/v1/AUTH_2ac4bfee353948ec8ea7fd1710574097/mr-public/Misc/kindle-x-tc-11.1.N-r19006.tar.xz
          tar xf kindle-x-tc-11.1.N-r19006.tar.xz
          export PATH="$PWD/kindle-x-tc-11.1.N-r19006/bin:$PATH"
          arm-v5te-linux-gnueabi-gcc --version

      - name: Fix Lynx Autotools
        run: |
          cp configure.in configure.ac
          sed -i 's/AC_OUTPUT(/AC_CONFIG_FILES(/g' configure.ac
          autoreconf -fiv

      - name: Build Lynx for K3G
        run: |
          export CC=arm-v5te-linux-gnueabi-gcc
          export CFLAGS="-O2 -march=armv5te -msoft-float"

          ./configure \
            --host=arm-v5te-linux-gnueabi \
            --prefix=/opt \
            --with-ssl=openssl \
            --disable-gopher \
            $CC $CFLAGS

          make clean && make -j4

      - name: Package IPKG
        run: |
          mkdir -p lynx-k3g/usr/bin
          cp lynx lynx-k3g/usr/bin/
          mkdir -p lynx-k3g/CONTROL
          cat > lynx-k3g/CONTROL/control << EOF
          Package: lynx
          Version: 2.9.2u-k3g
          Architecture: armeabi
          Description: Lynx TLS 1.2+ (NiLuJe toolchain)
          Depends: openssl, ncurses
          EOF
          tar czf lynx_k3g.ipk -C lynx-k3g . --owner=0 --group=0

      - uses: actions/upload-artifact@v4
        with:
          name: lynx-k3g-production
          path: lynx_k3g.ipk
