name: Kindle K3G Lynx (NiLuJe Toolchain)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots
          ref: master

      - name: Download NiLuJe K3 Toolchain
        run: |
          wget "http://www.mobileread.com/forums/attachment.php?attachmentid=XXXX" \
            -O k3-toolchain.tar.bz2  # Replace XXXX with actual ID from post
          tar xjf k3-toolchain.tar.bz2
          export PATH="$PWD/k3-toolchain/bin:$PATH"

      - name: Fix Lynx Autotools
        run: |
          cp configure.in configure.ac
          sed -i 's/AC_OUTPUT(/AC_CONFIG_FILES(/g' configure.ac
          autoreconf -fiv

      - name: Configure + Build Lynx
        run: |
          export CC=arm-v5te-linux-gnueabi-gcc
          export CFLAGS="-O2 -march=armv5te -msoft-float -static"

          ./configure \
            --host=arm-v5te-linux-gnueabi \
            --prefix=/opt \
            --with-ssl=openssl \
            --disable-gopher \
            $CFLAGS $LDFLAGS
          
          make clean && make -j4

      - name: Package IPK
        run: |
          mkdir -p lynx-k3/usr/bin
          cp lynx lynx-k3/usr/bin/
          # Create IPK control file...
          tar czf lynx-k3g.ipk -C lynx-k3 .
        
      - uses: actions/upload-artifact@v4
        with:
          name: lynx-k3g-production
          path: lynx-k3g.ipk
