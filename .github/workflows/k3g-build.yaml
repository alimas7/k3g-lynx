name: Kindle K3G Lynx (Crosstool-NG ARM1136 i.MX353)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lynx Snapshots
        uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots
          ref: master

      - name: Install Crosstool-NG Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git autoconf automake libtool pkg-config \
            gawk bison flex texinfo gperf libtool-bin help2man make \
            libncurses5-dev libssl-dev zlib1g-dev libexpat-dev \
            quilt libgmp-dev libmpfr-dev libmpc-dev

      - name: Clone Crosstool-NG
        run: |
          git clone --depth 1 https://github.com/crosstool-ng/crosstool-ng.git
          cd crosstool-ng
          ./bootstrap
          ./configure --prefix=/opt/crosstool-ng --enable-local
          make -j$(nproc)
          sudo make install

      - name: Create K3G ARM1136 Config
        run: |
          export PATH="/opt/crosstool-ng/bin:$PATH"
          ct-ng menuconfig << 'EOF'
          # Kindle K3G: Freescale i.MX353 ARM1136J-S @542MHz
          Target options
          Target architecture → ARM (little endian)
          Target architecture variant → armv6
          Target CPU → arm1136jf-s
          Target ABI → EABIhf
          Floating point → VFPv2
          Endianness → Little endian
          Bitness → 32-bit

          Operating System
          Target OS → linux

          Toolchain options
          C compiler → gcc: linaro-12.2.1
          Binutils → 2.40
          Linux kernel → 5.4
          C library → glibc (2.36)
          Debug prefix → Full path components
          Strip executables → No
          EOF
          ct-ng oldconfig
          ct-ng savedefconfig -o k3g-arm1136.config

      - name: Build K3G ARM1136 Toolchain
        run: |
          export PATH="/opt/crosstool-ng/bin:$PATH"
          ct-ng build
          echo "Toolchain built: /opt/x-tools/armv6-rpi-linux-gnueabihf/"

      - name: Fix Lynx Autotools
        run: |
          cp configure.in configure.ac || true
          sed -i 's/AC_OUTPUT(/AC_CONFIG_FILES(/g' configure.ac || true
          autoreconf -fiv || autoreconf -fi

      - name: Activate K3G ARM1136 Toolchain
        run: |
          source /opt/x-tools/armv6-rpi-linux-gnueabihf/buildscripts/environment-setup-armv6-rpi-linux-gnueabihf.sh
          echo "CC=$CC"
          echo "CXX=$CXX"
          $CC --version

      - name: Configure Lynx for i.MX353 ARM1136
        run: |
          source /opt/x-tools/armv6-rpi-linux-gnueabihf/buildscripts/environment-setup-armv6-rpi-linux-gnueabihf.sh
          export CFLAGS="-O2 -march=armv6 -mtune=arm1136jf-s -mfpu=vfpv2 -mfloat-abi=hard"
          export LDFLAGS="-static"

          ./configure \
            --host=armv6-rpi-linux-gnueabihf \
            --prefix=/opt \
            --with-ssl=openssl \
            --disable-gopher \
            --disable-prettysrc \
            --enable-nsl-fork \
            CFLAGS="$CFLAGS" \
            LDFLAGS="$LDFLAGS"

      - name: Build Lynx
        run: |
          source /opt/x-tools/armv6-rpi-linux-gnueabihf/buildscripts/environment-setup-armv6-rpi-linux-gnueabihf.sh
          make clean
          make -j$(nproc) V=1

      - name: Verify ARM1136 Binary
        run: |
          source /opt/x-tools/armv6-rpi-linux-gnueabihf/buildscripts/environment-setup-armv6-rpi-linux-gnueabihf.sh
          file lynx
          $AR t lynx || true
          $STRIP lynx
          ls -lh lynx

      - name: Package IPKG for Kindle K3G
        run: |
          mkdir -p lynx-k3g/{usr/bin,opt/lynx,CONTROL}
          cp lynx lynx-k3g/usr/bin/
          cp src/lynx.cfg.sample lynx-k3g/opt/lynx/

          cat > lynx-k3g/CONTROL/control << 'EOF'
          Package: lynx
          Version: 2.9.2u-k3g
          Section: net
          Architecture: armeabi
          Maintainer: K3G Hacker
          Description: Lynx TLS 1.2+ for Kindle Keyboard 3G (B006)
           i.MX353 ARM1136J-S @542MHz, firmware 3.4.x OptWare
          Depends: openssl, ncurses, libc
          EOF

          tar czf lynx_k3g_arm1136.ipk -C lynx-k3g . --owner=0 --group=0

      - name: Install Instructions
        if: always()
        run: |
          cat << 'EOF' > K3G-INSTALL.md
          # Kindle Keyboard 3G Lynx (ARM1136 i.MX353)

          TARGET: K3G B006 firmware 3.4.x (jailbroken)

          PREREQS:
          • Jailbreak (MobileRead wiki)
          • OptWare: ipkg update; ipkg install openssl ncurses

          INSTALL:
          1. scp lynx_k3g_arm1136.ipk kindle:/mnt/us/
          2. ssh root@kindle "ipkg install /mnt/us/lynx_k3g_arm1136.ipk"
          3. /opt/bin/lynx -version
          4. /opt/bin/lynx https://wikipedia.org

          KEYS: g=URL, q=quit, ↑↓=navigate, ENTER=follow
          EOF
          cat K3G-INSTALL.md

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lynx-k3g-arm1136
          path: |
            lynx_k3g_arm1136.ipk
            lynx
            K3G-INSTALL.md
