name: Kindle K3G Lynx Snapshot Build (Fixed Cross-Compiler)

on: workflow_dispatch

jobs:
  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lynx Snapshots Fork
        uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots
          ref: master

      - name: Install COMPLETE ARMv5 Toolchain + Sysroot
        run: |
          sudo dpkg --add-architecture armel
          sudo apt update
          sudo apt install -y build-essential autoconf automake libtool pkg-config
          sudo apt install -y gcc-arm-linux-gnueabi g++-arm-linux-gnueabi
          sudo apt install -y libc6-dev-armel-cross libncurses5-dev:armel libssl-dev:armel
          sudo apt install -y binutils-arm-linux-gnueabi

      - name: Verify Cross-Compiler + ARM Sysroot
        run: |
          arm-linux-gnueabi-gcc --version
          arm-linux-gnueabi-gcc -print-sysroot
          arm-linux-gnueabi-gcc -v -dumpversion
          echo 'int main(){return 0;}' > test.c
          arm-linux-gnueabi-gcc -static test.c -o test-arm
          file test-arm
          arm-linux-gnueabi-objdump -h test-arm

      - name: Fix Autoreconf Issues
        run: |
          cp configure.in configure.ac
          touch acconfig.h
          echo "#define USE_X509_SUPPORT 1" >> acconfig.h
          sed -i 's/AC_OUTPUT(/AC_CONFIG_FILES(/g' configure.ac
          autoupdate

      - name: Autoreconf
        run: |
          autoreconf -fiv

      - name: Setup Kindle K3G Environment (Fixed Paths)
        run: |
          export CROSS_TRIPLE=arm-linux-gnueabi
          export CC=arm-linux-gnueabi-gcc
          export CXX=arm-linux-gnueabi-g++
          export AR=arm-linux-gnueabi-ar
          export RANLIB=arm-linux-gnueabi-ranlib
          export STRIP=arm-linux-gnueabi-strip
          export PKG_CONFIG_PATH=/usr/arm-linux-gnueabi/lib/pkgconfig:/usr/lib/arm-linux-gnueabi/pkgconfig
          export PKG_CONFIG_LIBDIR=/usr/arm-linux-gnueabi/lib
          echo "CROSS_TRIPLE=${CROSS_TRIPLE}" >> $GITHUB_ENV
          echo "CC=${CC}" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}" >> $GITHUB_ENV

      - name: Configure Lynx for K3G (Static + Sysroot)
        run: |
          # Use cross-compiler sysroot and static linking
          ./configure \
            --host=${CROSS_TRIPLE} \
            --prefix=/opt \
            --with-ssl=openssl \
            --disable-gopher \
            --disable-prettysrc \
            CC="${CC}" \
            CFLAGS="-O2 -static -march=armv5te -mtune=arm926ej-s -msoft-float -marm" \
            LDFLAGS="-static --sysroot=/usr/arm-linux-gnueabi" \
            LIBS="-static -lncurses -lssl -lcrypto -lz"

      - name: Build Lynx
        run: |
          make clean
          make V=1

      - name: Verify + Strip Binary
        run: |
          file lynx
          arm-linux-gnueabi-strip lynx
          ls -lh lynx
          arm-linux-gnueabi-readelf -h lynx

      - name: Package IPKG
        run: |
          mkdir -p lynx-k3g/usr/bin
          cp lynx lynx-k3g/usr/bin/

          mkdir -p lynx-k3g/CONTROL
          cat > lynx-k3g/CONTROL/control << 'EOF'
          Package: lynx
          Version: 2.9.2u-k3g
          Architecture: armeabi
          Description: Lynx TLS 1.2+ for Kindle Keyboard 3G i.MX353
          Depends: openssl, ncurses
          EOF
          tar czf lynx_k3g.arm.ipk -C lynx-k3g . --owner=0 --group=0

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lynx-k3g-final
          path: |
            lynx_k3g.arm.ipk
            lynx
