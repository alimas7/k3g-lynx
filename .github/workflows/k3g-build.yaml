name: Kindle K3G Lynx Snapshot Build

on: workflow_dispatch

jobs:
  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lynx Snapshots Fork
        uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots
          ref: v2-9-2u  # Latest snapshot Sep 2025 [web:51]

      - name: Install ARMv5 Cross-Toolchain
        run: |
          sudo apt update
          sudo apt install -y build-essential autoconf automake libtool pkg-config
          sudo apt install -y gcc-arm-linux-gnueabi libc6-dev-armel-cross 
          sudo apt install -y libncurses5-dev libssl-dev bc bison flex

      - name: Setup Kindle K3G Environment
        run: |
          export CROSS_TRIPLE=arm-linux-gnueabi
          export CC=arm-linux-gnueabi-gcc
          export CXX=arm-linux-gnueabi-g++
          export AR=arm-linux-gnueabi-ar
          export RANLIB=arm-linux-gnueabi-ranlib
          export STRIP=arm-linux-gnueabi-strip
          echo "CROSS_TRIPLE=${CROSS_TRIPLE}" >> $GITHUB_ENV
          echo "CC=${CC}" >> $GITHUB_ENV
          echo "CXX=${CXX}" >> $GITHUB_ENV
          echo "AR=${AR}" >> $GITHUB_ENV
          echo "RANLIB=${RANLIB}" >> $GITHUB_ENV
          echo "STRIP=${STRIP}" >> $GITHUB_ENV

      - name: Autoreconf Lynx
        run: |
          autoreconf -fiv

      - name: Configure for Kindle Keyboard 3G (i.MX353 ARM1136)
        run: |
          ./configure \
            --host=${CROSS_TRIPLE} \
            --prefix=/opt \
            --enable-curses \
            --with-ssl=openssl \
            --enable-nsl-fork \
            --enable-cgi=/no \
            --disable-gopher \
            --disable-prettysrc \
            --without-gpm \
            --enable-debug \
            CFLAGS="-O2 -static -march=armv5te -mtune=arm926ej-s -msoft-float -marm" \
            LDFLAGS="-static -L/usr/arm-linux-gnueabi/lib" \
            LIBS="-lncurses -lssl -lcrypto -lz"

      - name: Build Lynx
        run: |
          make clean
          make -j$(nproc) V=1

      - name: Verify TLS 1.2 Support
        run: |
          file lynx || true
          ${CC} -v || true
          strings lynx | grep -i openssl || true

      - name: Package IPKG for K3G OptWare
        run: |
          mkdir -p lynx-k3_{{ github.sha }}/usr/bin lynx-k3_{{ github.sha }}/opt/lynx
          cp lynx lynx-k3_{{ github.sha }}/usr/bin/
          cp src/lynx.cfg.sample lynx-k3_{{ github.sha }}/opt/lynx/
          
          # K3G IPKG control file
          mkdir -p lynx-k3_{{ github.sha }}/CONTROL
          cat > lynx-k3_{{ github.sha }}/CONTROL/control << 'EOF'
          Package: lynx
          Version: 2.9.2-snapshot
          Architecture: armeabi
          Maintainer: K3G Hacker
          Description: Lynx text browser TLS 1.2+ for Kindle Keyboard 3G
           Cross-compiled for Freescale i.MX353 ARM1136 @532MHz
           Firmware 3.4.x jailbroken OptWare /opt
          Depends: openssl, ncurses, libc
          EOF

          # Create IPK
          tar czf lynx_k3g_${{ github.sha }}.arm.ipk \
            -C lynx-k3_${{ github.sha }} \
            --owner=0 --group=0 \
            .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lynx-k3g-${{ github.sha }}
          path: |
            lynx_k3g_${{ github.sha }}.arm.ipk
            lynx
            src/lynx.cfg.sample

      # - name: Deploy Instructions
