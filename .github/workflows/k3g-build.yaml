name: Kindle K3G Lynx (Native ARMv6 ARM1136)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lynx
        uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots
          ref: master

      - name: Install Ubuntu ARMv6 Toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          sudo apt install -y libc6-dev-armhf-cross binutils-arm-linux-gnueabihf
          sudo apt install -y build-essential autoconf automake libtool

      - name: Test ARM1136 Compiler
        run: |
          arm-linux-gnueabihf-gcc -v --target-help
          echo 'int main(){}' > test.c
          arm-linux-gnueabihf-gcc -static -march=armv6 -mtune=arm1136jf-s -mfpu=vfpv2 test.c -o test
          file test

      - name: Fix Lynx Autotools
        run: |
          cp configure.in configure.ac || true
          autoreconf -fiv

      - name: Configure for K3G i.MX353 ARM1136J-S
        run: |
          export CC=arm-linux-gnueabihf-gcc
          export CFLAGS="-O2 -static -march=armv6 -mtune=arm1136jf-s -mfpu=vfpv2 -mfloat-abi=hard"
          export LDFLAGS="-static"

          ./configure \
            --host=arm-linux-gnueabihf \
            --prefix=/opt \
            --with-ssl=openssl \
            --disable-gopher \
            --disable-prettysrc \
            CC="$CC" CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"

      - name: Build Lynx
        run: |
          export CC=arm-linux-gnueabihf-gcc
          export CFLAGS="-O2 -static -march=armv6 -mtune=arm1136jf-s -mfpu=vfpv2 -mfloat-abi=hard"
          make clean && make -j$(nproc)

      - name: Verify K3G Binary
        run: |
          file lynx
          arm-linux-gnueabihf-strip lynx
          ls -lh lynx

      - name: Package IPKG
        run: |
          mkdir -p lynx-k3g/{usr/bin,CONTROL}
          cp lynx lynx-k3g/usr/bin/
          cat > lynx-k3g/CONTROL/control << EOF
          Package: lynx
          Version: 2.9.2u-k3g
          Architecture: armeabi
          Description: Lynx TLS 1.2+ Kindle K3G i.MX353 ARM1136
          Depends: openssl, ncurses
          EOF
          tar czf lynx_k3g_arm1136.ipk -C lynx-k3g .

      - uses: actions/upload-artifact@v4
        with:
          name: lynx-k3g-arm1136
          path: lynx_k3g_arm1136.ipk
