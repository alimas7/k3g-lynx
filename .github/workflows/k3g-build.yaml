name: Kindle K3G Lynx Snapshot Build (Fixed Dependencies)

on: workflow_dispatch

jobs:
  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lynx Snapshots Fork
        uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots
          ref: master

      - name: Install ARMv5 Cross-Toolchain (No i386)
        run: |
          sudo apt update
          sudo apt install -y build-essential autoconf automake libtool pkg-config
          sudo apt install -y gcc-arm-linux-gnueabi libc6-dev-armel-cross
          sudo apt install -y libncurses5-dev libssl-dev bc bison flex
          # Native 64-bit host libs only - cross-compiler links statically

      - name: Fix Autoreconf Issues
        run: |
          cp configure.in configure.ac
          touch acconfig.h
          echo "#define USE_X509_SUPPORT 1" >> acconfig.h
          sed -i 's/AC_OUTPUT(/AC_CONFIG_FILES(/g' configure.ac
          autoupdate

      - name: Autoreconf
        run: |
          autoreconf -fiv

      - name: Setup Kindle K3G Environment
        run: |
          export CROSS_TRIPLE=arm-linux-gnueabi
          export CC=arm-linux-gnueabi-gcc
          export CXX=arm-linux-gnueabi-g++
          export AR=arm-linux-gnueabi-ar
          export RANLIB=arm-linux-gnueabi-ranlib
          export STRIP=arm-linux-gnueabi-strip
          echo "CROSS_TRIPLE=${CROSS_TRIPLE}" >> $GITHUB_ENV
          echo "CC=${CC}" >> $GITHUB_ENV
          echo "CXX=${CXX}" >> $GITHUB_ENV

      - name: Configure for Kindle Keyboard 3G
        run: |
          ./configure \
            --host=${CROSS_TRIPLE} \
            --prefix=/opt \
            --enable-curses \
            --with-ssl=openssl \
            --enable-nsl-fork \
            --enable-cgi=/no \
            --disable-gopher \
            --disable-prettysrc \
            --without-gpm \
            CFLAGS="-O2 -static -march=armv5te -mtune=arm926ej-s -msoft-float -marm" \
            LDFLAGS="-static" \
            LIBS="-lncurses -lssl -lcrypto -lz"

      - name: Build Lynx
        run: |
          make clean
          make -j$(nproc) V=1

      - name: Package IPKG
        run: |
          mkdir -p lynx-k3g/usr/bin lynx-k3g/opt/lynx
          cp lynx lynx-k3g/usr/bin/
          cp src/lynx.cfg.sample lynx-k3g/opt/lynx/

          mkdir -p lynx-k3g/CONTROL
          cat > lynx-k3g/CONTROL/control << 'EOF'
          Package: lynx
          Version: 2.9.2-snapshot
          Architecture: armeabi
          Description: Lynx text browser TLS 1.2+ for Kindle Keyboard 3G (B006)
          Depends: openssl, ncurses
          EOF

          tar czf lynx_k3g.arm.ipk -C lynx-k3g . --owner=0 --group=0

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lynx-k3g-ipk
          path: |
            lynx_k3g.arm.ipk
            lynx
