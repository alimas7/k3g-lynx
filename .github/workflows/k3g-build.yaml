name: Kindle K3G Lynx (ARMv6 Soft-Float - FIXED)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots
          ref: master

      - name: Install ARMv6 Toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabi g++-arm-linux-gnueabi
          sudo apt install -y libc6-dev-armel-cross binutils-arm-linux-gnueabi
          sudo apt install -y build-essential autoconf automake libtool

      - name: Test ARMv6 Compiler
        run: |
          echo 'int main(){return 0;}' > test.c
          arm-linux-gnueabi-gcc -static -march=armv6 -msoft-float test.c -o test
          file test

      - name: Fix Lynx Autotools
        run: |
          cp configure.in configure.ac || true
          sed -i 's/AC_OUTPUT(/AC_CONFIG_FILES(/g' configure.ac || true
          autoreconf -fiv || autoreconf -fi

      - name: Configure Lynx for K3G i.MX353 ARM1136
        run: |
          export CC=arm-linux-gnueabi-gcc
          export CFLAGS="-O2 -static -march=armv6 -mtune=arm1136jf-s -msoft-float"

          ./configure \
            --host=arm-linux-gnueabi \
            --prefix=/opt \
            --disable-ssl \
            --disable-gopher \
            --disable-prettysrc \
            CC="$CC" CFLAGS="$CFLAGS"

      - name: Build Lynx
        run: |
          export CC=arm-linux-gnueabi-gcc
          export CFLAGS="-O2 -static -march=armv6 -mtune=arm1136jf-s -msoft-float"
          make clean && make -j$(nproc)

      - name: Verify Binary
        run: |
          file lynx
          arm-linux-gnueabi-strip lynx
          ls -lh lynx

      - name: Package IPKG
        run: |
          mkdir -p lynx-k3g/{usr/bin,CONTROL}
          cp lynx lynx-k3g/usr/bin/
          cat > lynx-k3g/CONTROL/control << EOF
          Package: lynx
          Version: 2.9.2u-k3g
          Architecture: armeabi
          Description: Lynx text browser for Kindle K3G ARM1136
          Depends: ncurses
          EOF
          tar czf lynx_k3g.ipk -C lynx-k3g .

      - uses: actions/upload-artifact@v4
        with:
          name: lynx-k3g-armv6
          path: lynx_k3g.ipk
