name: Kindle K3G Lynx (ARMv6 ARM1136 - PRODUCTION READY)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lynx Snapshots
        uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots
          ref: master

      - name: Install ARMv6 Cross-Compiler
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabi g++-arm-linux-gnueabi
          sudo apt install -y libc6-dev-armel-cross binutils-arm-linux-gnueabi
          sudo apt install -y build-essential autoconf automake libtool ncurses-dev

      - name: Test ARMv6 Compiler (Unique filename)
        run: |
          rm -rf k3g-test* 2>/dev/null || true
          echo '#include <stdio.h>
          int main(){printf("K3G ARM1136 OK\\n"); return 0;}' > k3g-test.c
          arm-linux-gnueabi-gcc -static -march=armv6 -msoft-float k3g-test.c -o k3g-test
          file k3g-test
          # ./k3g-test
          rm k3g-test.c k3g-test

      - name: Fix Lynx Autotools (CORRECT)
        run: |
          # Keep configure.ac, just fix it
          cp configure.in configure.ac 2>/dev/null || true

          # Fix USE_X509_SUPPORT - create missing header
          touch acconfig.h 2>/dev/null || true
          grep -q "USE_X509_SUPPORT" acconfig.h || echo "undef USE_X509_SUPPORT" >> acconfig.h

          # Update obsolete macros
          autoupdate configure.ac 2>/dev/null || true

          # Run autoreconf
          autoreconf -fiv

      - name: Configure Lynx for Kindle K3G i.MX353 ARM1136J-S
        run: |
          export CC=arm-linux-gnueabi-gcc
          export AR=arm-linux-gnueabi-ar
          export RANLIB=arm-linux-gnueabi-ranlib
          export STRIP=arm-linux-gnueabi-strip
          export CFLAGS="-O2 -static -march=armv6 -mtune=arm1136jf-s -msoft-float"
          export LDFLAGS="-static"

          ./configure \
            --host=arm-linux-gnueabi \
            --prefix=/opt \
            --disable-all \
            --disable-ssl \
            --disable-gopher \
            --disable-nls \
            --disable-prettysrc \
            --without-gpm \
            CC="$CC" \
            CFLAGS="$CFLAGS" \
            LDFLAGS="$LDFLAGS"

      - name: Build Lynx
        run: |
          export CC=arm-linux-gnueabi-gcc
          export CFLAGS="-O2 -static -march=armv6 -mtune=arm1136jf-s -msoft-float"
          make clean || true
          make -j$(nproc) V=1

      - name: Verify K3G Binary
        run: |
          file lynx
          arm-linux-gnueabi-strip lynx
          ls -lh lynx
          arm-linux-gnueabi-readelf -h lynx | head -20

      - name: Create OptWare IPKG
        run: |
          mkdir -p lynx-k3g/{DEBIAN,usr/bin,opt/lynx}
          cp lynx lynx-k3g/usr/bin/
          cp src/lynx.cfg lynx-k3g/opt/lynx/ 2>/dev/null || true

          cat > lynx-k3g/DEBIAN/control << EOF
          Package: lynx
          Version: 2.9.2u-k3g1
          Section: net
          Priority: optional
          Architecture: armeabi
          Maintainer: K3G Hacker <k3g@hack>
          Description: Lynx text browser for Kindle Keyboard 3G (B006)
           Static ARMv6 soft-float for i.MX353 ARM1136J-S @542MHz
           Firmware 3.4.x jailbroken OptWare compatible
          Depends: ncurses
          EOF

          # Create IPK (tar.gz format for ipkg)
          cd lynx-k3g
          tar czf ../lynx_k3g.ipk * --owner=0 --group=0 --numeric-owner

