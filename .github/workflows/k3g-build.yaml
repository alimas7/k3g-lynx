name: Kindle K3G Lynx (NiLuJe Toolchain - PRODUCTION)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lynx Snapshots
        uses: actions/checkout@v4
        with:
          repository: ThomasDickey/lynx-snapshots
          ref: master

      - name: Download NiLuJe's Kindle Toolchain (K3G ARM1136)
        run: |
          wget https://storage.gra.cloud.ovh.net/v1/AUTH_2ac4bfee353948ec8ea7fd1710574097/mr-public/Misc/kindle-x-tc-11.1.N-r19006.tar.xz
          tar xf kindle-x-tc-11.1.N-r19006.tar.xz
          ls kindle-x-tc-11.1.N-r19006/bin/arm*

      - name: Fix Lynx Autotools
        run: |
          cp configure.in configure.ac || true
          sed -i 's/AC_OUTPUT(/AC_CONFIG_FILES(/g' configure.ac || true
          autoreconf -fiv || autoreconf -fi

      - name: Build Lynx for K3G i.MX353 ARM1136
        run: |
          export PATH="$PWD/kindle-x-tc-11.1.N-r19006/bin:$PATH"
          export CC=arm-v5te-linux-gnueabi-gcc
          export CFLAGS="-O2 -march=armv6 -mtune=arm1136jf-s -mfpu=vfpv2 -mfloat-abi=hard"
          
          ./configure \
            --host=arm-v5te-linux-gnueabi \
            --prefix=/opt \
            --with-ssl=openssl \
            --disable-gopher \
            --disable-prettysrc \
            CC="$CC" \
            CFLAGS="$CFLAGS"
          
          make clean && make -j$(nproc)

      - name: Verify ARM1136 Binary
        run: |
          export PATH="$PWD/kindle-x-tc-11.1.N-r19006/bin:$PATH"
          file lynx
          arm-v5te-linux-gnueabi-strip lynx
          ls -lh lynx

      - name: Package IPKG for Kindle K3G
        run: |
          mkdir -p lynx-k3g/{usr/bin,CONTROL}
          cp lynx lynx-k3g/usr/bin/
          
          cat > lynx-k3g/CONTROL/control << EOF
          Package: lynx
          Version: 2.9.2u-k3g
          Section: net
          Architecture: armeabi
          Maintainer: K3G Hacker
          Description: Lynx TLS 1.2+ for Kindle Keyboard 3G B006
           Freescale i.MX353 ARM1136J-S @542MHz
          Depends: openssl, ncurses
          EOF
          
          tar czf lynx_k3g_arm1136.ipk -C lynx-k3g . --owner=0 --group=0

      - name: Deploy Instructions
        if: always()
        run: |
          cat << 'EOF' > K3G-INSTALL.md
          # Kindle Keyboard 3G Lynx TLS 1.2 (i.MX353 ARM1136)

          PREREQUISITES (jailbroken firmware 3.4.x):
          $ ipkg update
          $ ipkg install openssl ncurses

          INSTALL:
          1. Copy lynx_k3g_arm1136.ipk → /mnt/us/
          2. $ ipkg install /mnt/us/lynx_k3g_arm1136.ipk
          3. $ /opt/bin/lynx https://wikipedia.org

          KEYBINDINGS:
          g = Go to URL    q = Quit
          ↑↓ = Navigate    ENTER = Follow link
          h = Help         / = Search
          EOF

      - name: Upload Production IPK
        uses: actions/upload-artifact@v4
        with:
          name: lynx-k3g-production-arm1136
          path: |
            lynx_k3g_arm1136.ipk
            lynx
            K3G-INSTALL.md
